services:
  esds-apps:
    build: .
    container_name: esds-apps
    restart: always
    expose:
    - "8080"
    volumes:
      # Host directory must be writable by uid 1001 (appuser). Run once: mkdir -p esds_cache && chown 1001:1001 esds_cache
      - ./esds_cache:/tmp/esds_cache
      - ./esds-group-checker-sa.json:/run/secrets/esds-group-checker-sa.json:ro

  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/mnt/certbot_webroot:ro
    depends_on:
      - esds-apps
